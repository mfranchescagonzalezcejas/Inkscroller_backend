name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      # ── Quality gates ────────────────────────────────────────────────────────

      - name: Lint
        run: |
          ruff check app/ main.py
          ruff format --check app/ main.py

      - name: Test
        run: python -m unittest discover -s tests -v

      # ── Build Docker image ───────────────────────────────────────────────────

      - name: Build image
        run: |
          docker build -t inkscroller-backend:${{ github.sha }} .

      # ── Deploy DEV ───────────────────────────────────────────────────────────

      - name: Authenticate to GCP (DEV)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON_DEV }}

      - name: Set up gcloud (DEV)
        uses: google-github-actions/setup-gcloud@v2

      - name: Push image to GCR (DEV)
        run: |
          gcloud auth configure-docker --quiet
          docker tag inkscroller-backend:${{ github.sha }} \
            gcr.io/inkscroller-aed59/inkscroller-backend:${{ github.sha }}
          docker tag inkscroller-backend:${{ github.sha }} \
            gcr.io/inkscroller-aed59/inkscroller-backend:latest
          docker push gcr.io/inkscroller-aed59/inkscroller-backend:${{ github.sha }}
          docker push gcr.io/inkscroller-aed59/inkscroller-backend:latest

      - name: Deploy to Cloud Run (DEV)
        run: |
          gcloud run deploy inkscroller-backend \
            --image gcr.io/inkscroller-aed59/inkscroller-backend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --project inkscroller-aed59 \
            --allow-unauthenticated \
            --set-env-vars FIREBASE_PROJECT_ID=inkscroller-aed59,DB_PATH=/app/data/inkscroller.db \
            --quiet

      # ── Deploy STAGING ───────────────────────────────────────────────────────

      - name: Authenticate to GCP (STAGING)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON_STAGING }}

      - name: Set up gcloud (STAGING)
        uses: google-github-actions/setup-gcloud@v2

      - name: Push image to GCR (STAGING)
        run: |
          gcloud auth configure-docker --quiet
          docker tag inkscroller-backend:${{ github.sha }} \
            gcr.io/inkscroller-stg/inkscroller-backend:${{ github.sha }}
          docker tag inkscroller-backend:${{ github.sha }} \
            gcr.io/inkscroller-stg/inkscroller-backend:latest
          docker push gcr.io/inkscroller-stg/inkscroller-backend:${{ github.sha }}
          docker push gcr.io/inkscroller-stg/inkscroller-backend:latest

      - name: Deploy to Cloud Run (STAGING)
        run: |
          gcloud run deploy inkscroller-backend \
            --image gcr.io/inkscroller-stg/inkscroller-backend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --project inkscroller-stg \
            --allow-unauthenticated \
            --set-env-vars FIREBASE_PROJECT_ID=inkscroller-stg,DB_PATH=/app/data/inkscroller.db \
            --quiet

      # ── Deploy PRO ───────────────────────────────────────────────────────────

      - name: Authenticate to GCP (PRO)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON_PRO }}

      - name: Set up gcloud (PRO)
        uses: google-github-actions/setup-gcloud@v2

      - name: Push image to GCR (PRO)
        run: |
          gcloud auth configure-docker --quiet
          docker tag inkscroller-backend:${{ github.sha }} \
            gcr.io/inkscroller-8fa87/inkscroller-backend:${{ github.sha }}
          docker tag inkscroller-backend:${{ github.sha }} \
            gcr.io/inkscroller-8fa87/inkscroller-backend:latest
          docker push gcr.io/inkscroller-8fa87/inkscroller-backend:${{ github.sha }}
          docker push gcr.io/inkscroller-8fa87/inkscroller-backend:latest

      - name: Deploy to Cloud Run (PRO)
        run: |
          gcloud run deploy inkscroller-backend \
            --image gcr.io/inkscroller-8fa87/inkscroller-backend:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --project inkscroller-8fa87 \
            --allow-unauthenticated \
            --set-env-vars FIREBASE_PROJECT_ID=inkscroller-8fa87,DB_PATH=/app/data/inkscroller.db \
            --quiet
