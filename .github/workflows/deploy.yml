name: Release Validation

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate main before Railway deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r requirements.txt

      - name: Lint
        run: |
          ruff check app/ main.py
          ruff format --check app/ main.py

      - name: Test
        run: python -m unittest discover -s tests -v

      - name: Railway deployment note
        run: |
          echo "Railway handles deployment automatically for the configured production branch."
          echo "This workflow only validates the main branch after merge."
