name: Release Validation

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate-release:
    name: Validate main before Railway deploy
    uses: ./.github/workflows/validate.yml

  railway-deployment-note:
    needs: validate-release
    runs-on: ubuntu-latest
    steps:
      - name: Railway deployment note
        run: |
          echo "Railway handles deployment automatically for the configured production branch."
          echo "This workflow only validates the main branch after merge."
